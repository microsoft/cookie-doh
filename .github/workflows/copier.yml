name: copier

on:
  workflow_call:

jobs:
  copier:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        precommit: [true, false]
        documentation: [true, false]
        commitizen: [true, false]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Copier
        run: uv tool install copier

      - name: Run Copier Template
        run: |
          copier copy . .tmp/generated-template \
            --defaults \
            -d organization="microsoft" \
            -d project_name="cookie-doh" \
            -d module_name="cookie" \
            -d cli="doh" \
            -d flash_attn="${{ matrix.flash_attn }}" \
            -d precommit="${{ matrix.precommit }}" \
            -d documentation="${{ matrix.documentation }}" \
            -d commitizen="${{ matrix.commitizen }}"

      - name: Verify Generated Template
        run: |
          cd .tmp/generated-template
          ls -la
          git init -q
          git add -A
          if ${{ matrix.precommit }}; then
            SKIP=pinact uvx pre-commit run --all-files
          fi
          uvx ruff check --exit-non-zero-on-fix
          uvx ruff format --exit-non-zero-on-format
          uvx codespell
