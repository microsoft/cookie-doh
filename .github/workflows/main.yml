name: main

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precommit:
    uses: ./.github/workflows/precommit.yml
    permissions:
      contents: read

  tests:
    uses: ./.github/workflows/tests.yml
    permissions:
      contents: read
  docs:
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  wheels:
    uses: ./.github/workflows/wheels.yml
    permissions:
      contents: read
      actions: write
      id-token: write
      attestations: write

  copier:
    uses: ./.github/workflows/copier.yml
    permissions:
      contents: read
